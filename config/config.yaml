# TELEGLAS Pro - Configuration File

# Trading Pairs to Monitor
pairs:
  primary:
    - BTCUSDT
    - ETHUSDT
    - BNBUSDT
  secondary:
    - SOLUSDT
    - ADAUSDT
    - MATICUSDT
    - AVAXUSDT
    - DOGEUSDT

# Detection Thresholds
thresholds:
  # Stop Hunt Detector
  liquidation_cascade: 2000000  # $2M
  absorption_minimum: 100000    # $100K
  
  # Order Flow Analyzer
  large_order_threshold: 25000  # $25K (filter out noise)
  accumulation_ratio: 0.72      # 72% buy ratio (strong accumulation only)
  distribution_ratio: 0.28      # 28% buy ratio (strong distribution only)
  min_large_orders: 5           # Minimum whale orders (need more confirmation)
  
  # Event Pattern Detector
  funding_rate_extreme: 0.001   # 0.1%

# Signal Settings
signals:
  min_confidence: 70.0           # Lowered from 78 — CVD VETO hard block handles quality
  max_signals_per_hour: 10       # Rate limit (quality over quantity)
  cooldown_minutes: 15           # Cooldown between same signals

# Alert Settings
alerts:
  rate_limit_delay: 3            # Seconds between Telegram messages
  max_retries: 3                 # Retry attempts on failure
  
  # Alert priorities
  urgent_threshold: 92           # Confidence for URGENT (very high conviction)
  watch_threshold: 85            # Confidence for WATCH
  info_threshold: 70             # Confidence for INFO (minimum quality)

# Buffer Settings
buffers:
  max_liquidations: 1000         # Per symbol
  max_trades: 500                # Per symbol
  cleanup_interval: 3600         # Seconds (1 hour)

# WebSocket Settings
websocket:
  url: "wss://open-ws.coinglass.com/ws-api"
  heartbeat_interval: 20         # Seconds
  reconnect_delay: 1             # Initial delay (exponential backoff)
  max_reconnect_delay: 60        # Max delay

# Logging
logging:
  level: "INFO"                  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "logs/teleglas.log"
  max_size_mb: 10
  backup_count: 5

# Detection Fine-Tuning
detection:
  absorption_min_order_usd: 5000   # Minimum order size to count as absorption

# Dashboard Settings
dashboard:
  api_token: "GANTI_DENGAN_TOKEN_RANDOM_YANG_PANJANG"
  cors_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:8081"
    - "https://teleglas.guardiansofthetoken.org"

# Dynamic Coin Monitoring
# mode: "all" = process ALL coins from CoinGlass (recommended)
#        "configured" = only process primary + secondary coins
monitoring:
  mode: "all"

  # 4-Tier Classification
  # Tier 1: Mega cap — most liquid, highest thresholds
  # Tier 2: Large cap — medium thresholds
  # Tier 3: Mid cap — lower thresholds
  # Tier 4: Small cap / meme — lowest thresholds, extra caution

  tier1_symbols:
    - BTCUSDT
    - ETHUSDT

  tier2_symbols:
    - SOLUSDT
    - BNBUSDT
    - XRPUSDT
    - DOGEUSDT
    - AVAXUSDT
    - SUIUSDT
    - ADAUSDT
    - DOTUSDT
    - LINKUSDT
    - LTCUSDT
    - UNIUSDT
    - AAVEUSDT
    - MATICUSDT

  tier3_symbols:
    - TRUMPUSDT
    - HYPEUSDT
    - TAOUSDT
    - JUPUSDT
    - ONDOUSDT
    - ENAUSDT
    - ARBUSDT
    - OPUSDT
    - APTUSDT
    - SEIUSDT
    - TIAUSDT
    - INJUSDT
    - FETUSDT
    - RENDERUSDT
    - STXUSDT
    - NEARUSDT
    - BCHUSDT
    - FILUSDT
    - ATOMUSDT
    - MKRUSDT
    - WIFUSDT
    - PEPEUSDT
    - XAUUSDT
    - XAGUSDT
    - PAXGUSDT

  # Tier 4 = everything not in tier 1/2/3 (dynamic)

  # Cooldown per tier (minutes) — prevents duplicate alerts per coin
  tier1_cooldown_minutes: 120      # BTC, ETH — 2 hours
  tier2_cooldown_minutes: 60       # Large caps — 1 hour
  tier3_cooldown_minutes: 45       # Mid caps — 45 min
  tier4_cooldown_minutes: 30       # Small caps — 30 min

  # Minimum 24h volume per tier (USD) — skip low-volume coins
  tier1_min_volume_24h: 100000000  # $100M
  tier2_min_volume_24h: 50000000   # $50M
  tier3_min_volume_24h: 15000000   # $15M
  tier4_min_volume_24h: 5000000    # $5M

  # Liquidation cascade thresholds per tier
  tier1_cascade: 3000000         # $3M for BTC, ETH
  tier2_cascade: 500000          # $500K for large caps
  tier3_cascade: 150000          # $150K for mid caps
  tier4_cascade: 50000           # $50K for small caps

  # Absorption thresholds per tier
  tier1_absorption: 200000       # $200K
  tier2_absorption: 50000        # $50K
  tier3_absorption: 15000        # $15K
  tier4_absorption: 5000         # $5K

  # CVD flip minimum value per tier (absolute cum_vol_delta)
  tier1_cvd_flip_min: 2000000    # $2M
  tier2_cvd_flip_min: 500000     # $500K
  tier3_cvd_flip_min: 100000     # $100K
  tier4_cvd_flip_min: 30000      # $30K

  # OI minimum for signal validity
  tier1_oi_min: 500000000        # $500M
  tier2_oi_min: 50000000         # $50M
  tier3_oi_min: 10000000         # $10M
  tier4_oi_min: 1000000          # $1M

  # FR extreme auto-skip (funding rate above this = skip signal for tier 3/4)
  fr_extreme_threshold: 0.01     # 1% per interval = extreme

  # Max concurrent analysis tasks (resource management)
  max_concurrent_analysis: 30

