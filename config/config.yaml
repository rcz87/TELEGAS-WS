# Market Context (OI + Funding Rate from CoinGlass REST API)
market_context:
  enabled: true
  poll_interval: 120             # Seconds between REST API polls (2 minutes)
  max_snapshots: 72              # Rolling buffer size per symbol (6 hours at 5-min)
  filter_mode: "normal"          # "strict" = only FAVORABLE, "normal" = block UNFAVORABLE, "permissive" = pass all
  confidence_adjust: true        # Adjust confidence based on market context
  cvd_enabled: true              # Fetch SpotCVD + FuturesCVD from CoinGlass
  cvd_interval: "5m"             # CVD candle interval
  cvd_lookback: 12               # Number of CVD candles to fetch
  whale_enabled: true             # Fetch Hyperliquid whale alerts
  whale_veto_threshold: 5000000   # $5M+ whale opposing = VETO
  whale_caution_threshold: 1000000  # $1M+ whale opposing = CAUTION
  orderbook_enabled: true           # Fetch orderbook bid/ask imbalance
  price_enabled: true               # Fetch price OHLC + volume

# Analysis Windows
analysis:
  stop_hunt_window: 30           # Seconds
  order_flow_window: 300         # Seconds (5 minutes)
  absorption_window: 30          # Seconds
